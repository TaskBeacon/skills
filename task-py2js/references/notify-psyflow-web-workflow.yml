name: Notify psyflow-web

# Required secret:
# - TASKBEACON_ORG_DISPATCH_TOKEN
# For a fine-grained PAT, grant access to TaskBeacon/psyflow-web with:
# - Contents: Read and write
# TaskBeacon org approval may also be required if PAT approval is enforced.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger shared runner refresh
        env:
          DISPATCH_TOKEN: ${{ secrets.TASKBEACON_ORG_DISPATCH_TOKEN }}
          SOURCE_REPO: ${{ github.event.repository.name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "TASKBEACON_ORG_DISPATCH_TOKEN is not configured; skipping shared runner refresh."
            exit 0
          fi

          curl --fail-with-body --request POST \
            --url https://api.github.com/repos/TaskBeacon/psyflow-web/dispatches \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $DISPATCH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "{\"event_type\":\"html-task-updated\",\"client_payload\":{\"source_repo\":\"$SOURCE_REPO\",\"source_sha\":\"$SOURCE_SHA\"}}"
